bundle:
  name: llm-wiki
  engine: direct

include:
  - resources/*.yaml

variables:
  catalog:
    description: Unity Catalog catalog name
    default: llm_wiki
  wiki_schema:
    description: Target schema for wiki tables
    default: wiki
  raw_schema:
    description: Target schema for raw source tables
    default: raw_sources
  is_development:
    description: Development mode for pipelines
    default: true
    type: boolean
  llm_endpoint:
    description: Foundation Model API endpoint for compilation
    default: databricks-claude-sonnet-4
  embedding_endpoint:
    description: Embedding model endpoint
    default: databricks-gte-large-en
  lakebase_instance:
    description: Lakebase instance name
    default: llm-wiki-db
  prod_user:
    description: Production run-as user
    default: ""

targets:
  dev:
    default: true
    mode: development
    variables:
      wiki_schema: wiki_${workspace.current_user.short_name}
      raw_schema: raw_sources_${workspace.current_user.short_name}
      is_development: true

  prod:
    mode: production
    variables:
      wiki_schema: wiki
      raw_schema: raw_sources
      is_development: false
    run_as:
      user_name: ${var.prod_user}
